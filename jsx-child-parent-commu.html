<!DOCTYPE html>
<html>
    <head>
        <title>Document</title>
        <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
        <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <style>
            .mybox{
                border: 2px solid gray;
                padding: 10px;
                margin: 20px;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <script type="text/babel">
            function Parent(){
                const [cData,setcData]= React.useState();
                function xyz(fn){
                    setcData(fn)
                }
                return(
                    <div className="mybox">
                        <h3 style={{color:"blue"}}>Parent</h3>
                        <h4>{cData}</h4>
                        <Child f={xyz}></Child>
                    </div>
                )
            }
            function Child(props){
                const [fullname,setFullname] = React.useState();
                return(
                    <div className="mybox">
                        <h3 style={{color:"green"}}>Child</h3>
                        <input type="text" onKeyUp={(ev) => {
                            setFullname(ev.target.value) 
                            props.f(ev.target.value)
                        }}/>
                        <br/><br/><b>{fullname}</b>
                    </div>
                )
            }
            ReactDOM.render(<Parent></Parent>,document.getElementById("root"))
        </script>
    </body>
</html>
